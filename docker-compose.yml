services:

  postgres:
    image: postgres:17
    container_name: shopiy-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopiy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopiy-redis
    restart: always
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq:latest
    container_name: shopiy-seq
    restart: always
    ports:
      - "5341:80"
    environment:
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
      ACCEPT_EULA: Y
    volumes:
      - seq_data:/data 
  shopiy-api:
    build:
      context: .
      dockerfile: src/Shopiy.Api/Dockerfile
    container_name: shopiy-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      seq:
        condition: service_started
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: >
        Host=postgres; Port=5432; Database=${POSTGRES_DB}; Username=${POSTGRES_USER}; Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Seq__ServerUrl: http://seq:5341
      Jwt__Issuer: Shopiy.Api
      Jwt__Audience: Shopiy.Client
      Jwt__Secret: ${JWT_SECRET}

volumes:
  postgres_data:
  seq_data: